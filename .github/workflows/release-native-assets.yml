name: Release Native Assets

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - name: Build macOS arm64 dylib
        run: |
          cargo build \
            --manifest-path packages/nexa_http_native_macos/native/nexa_http_native_macos_ffi/Cargo.toml \
            --target aarch64-apple-darwin \
            --release
          mkdir -p dist/native-assets
          cp target/aarch64-apple-darwin/release/libnexa_http_native_macos_ffi.dylib \
            dist/native-assets/nexa_http-native-macos-arm64.dylib
      - name: Build macOS x64 dylib
        run: |
          cargo build \
            --manifest-path packages/nexa_http_native_macos/native/nexa_http_native_macos_ffi/Cargo.toml \
            --target x86_64-apple-darwin \
            --release
          mkdir -p dist/native-assets
          cp target/x86_64-apple-darwin/release/libnexa_http_native_macos_ffi.dylib \
            dist/native-assets/nexa_http-native-macos-x64.dylib
      - name: Build iOS dylibs
        run: ./scripts/build_native_ios.sh release
      - name: Stage iOS assets
        run: |
          cp packages/nexa_http_native_ios/ios/Frameworks/libnexa_http_native-ios-arm64.dylib \
            dist/native-assets/nexa_http-native-ios-arm64.dylib
          cp packages/nexa_http_native_ios/ios/Frameworks/libnexa_http_native-ios-sim-arm64.dylib \
            dist/native-assets/nexa_http-native-ios-sim-arm64.dylib
          cp packages/nexa_http_native_ios/ios/Frameworks/libnexa_http_native-ios-sim-x64.dylib \
            dist/native-assets/nexa_http-native-ios-sim-x64.dylib
      - uses: actions/upload-artifact@v4
        with:
          name: native-assets-macos
          path: dist/native-assets/*

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;29.0.14206865"
      - name: Export Android environment
        run: |
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/29.0.14206865" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/29.0.14206865" >> "$GITHUB_ENV"
      - name: Build Android assets
        run: |
          ./scripts/build_native_android.sh release
          mkdir -p dist/native-assets
          cp packages/nexa_http_native_android/android/src/main/jniLibs/arm64-v8a/libnexa_http_native.so \
            dist/native-assets/nexa_http-native-android-arm64-v8a.so
          cp packages/nexa_http_native_android/android/src/main/jniLibs/armeabi-v7a/libnexa_http_native.so \
            dist/native-assets/nexa_http-native-android-armeabi-v7a.so
          cp packages/nexa_http_native_android/android/src/main/jniLibs/x86_64/libnexa_http_native.so \
            dist/native-assets/nexa_http-native-android-x86_64.so
      - uses: actions/upload-artifact@v4
        with:
          name: native-assets-android
          path: dist/native-assets/*

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build Windows asset
        run: |
          cargo build \
            --manifest-path packages/nexa_http_native_windows/native/nexa_http_native_windows_ffi/Cargo.toml \
            --target x86_64-pc-windows-msvc \
            --release
          mkdir -p dist/native-assets
          cp target/x86_64-pc-windows-msvc/release/nexa_http_native_windows_ffi.dll \
            dist/native-assets/nexa_http-native-windows-x64.dll
      - uses: actions/upload-artifact@v4
        with:
          name: native-assets-windows
          path: dist/native-assets/*

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-android
      - build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.11.3
      - name: Install workspace dependencies
        run: dart pub get
      - name: Verify aligned release-train versions
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: dart run scripts/workspace_tools.dart check-release-train --tag "$TAG_NAME"
      - uses: actions/download-artifact@v4
        with:
          pattern: native-assets-*
          merge-multiple: true
          path: dist/native-assets
      - name: Generate manifest and checksums
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          VERSION="${TAG_NAME#v}"
          dart run scripts/generate_native_asset_manifest.dart \
            --version "$VERSION" \
            --dist dist/native-assets \
            --output dist/nexa_http_native_assets_manifest.json \
            --sha-output dist/SHA256SUMS \
            --base-url "https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/native-assets/*
            dist/nexa_http_native_assets_manifest.json
            dist/SHA256SUMS
