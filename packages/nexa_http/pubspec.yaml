name: nexa_http
description: "A standard HTTP SDK for Flutter backed by a Rust reqwest core."
version: 1.0.0
publish_to: none
homepage: https://github.com/iamdennisme/nexa_http

environment:
  sdk: ^3.11.0

dependencies:
  crypto: ^3.0.6
  ffi: ^2.1.3
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  path: ^1.9.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.4.14
  ffigen: ^20.1.1
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  lints: ^5.1.1
  test: ^1.26.3
