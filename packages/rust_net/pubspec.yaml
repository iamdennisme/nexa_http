name: rust_net
description: "A standard HTTP SDK for Flutter backed by a Rust reqwest core."
version: 2.0.0
publish_to: none
homepage: https://github.com/iamdennisme/rust_net

environment:
  sdk: ^3.11.0

dependencies:
  code_assets: ^1.0.0
  crypto: ^3.0.6
  dio: ^5.9.0
  ffi: ^2.1.3
  freezed_annotation: ^2.4.4
  hooks: ^1.0.2
  json_annotation: ^4.9.0
  path: ^1.9.0
  rust_net_core:
    path: ../rust_net_core
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  lints: ^5.1.1
  test: ^1.26.3
