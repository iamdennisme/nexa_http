name: nexa_http
description: "A standard HTTP SDK for Flutter backed by a Rust reqwest core."
version: 1.0.1
publish_to: none
homepage: https://github.com/iamdennisme/nexa_http

environment:
  sdk: ^3.11.0

dependencies:
  ffi: ^2.1.3
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter:
    sdk: flutter
  nexa_http_runtime:
    path: ../nexa_http_runtime
  nexa_http_native_android:
    path: ../nexa_http_native_android
  nexa_http_native_ios:
    path: ../nexa_http_native_ios
  nexa_http_native_macos:
    path: ../nexa_http_native_macos
  nexa_http_native_windows:
    path: ../nexa_http_native_windows

dev_dependencies:
  build_runner: ^2.4.14
  ffigen: ^20.1.1
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  lints: ^5.1.1
  path: ^1.9.0
  test: ^1.26.3

flutter:
  plugin:
    platforms:
      android:
        default_package: nexa_http_native_android
      ios:
        default_package: nexa_http_native_ios
      macos:
        default_package: nexa_http_native_macos
      windows:
        default_package: nexa_http_native_windows
