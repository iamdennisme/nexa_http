[package]
name = "rust_net_native"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
ipnet = "2.11.0"
once_cell = "1.21.3"
reqwest = { version = "0.12.12", default-features = false, features = ["brotli", "deflate", "gzip", "http2", "rustls-tls", "socks", "system-proxy"] }
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.138"
tokio = { version = "1.45.0", features = ["rt-multi-thread", "sync"] }

[target.'cfg(any(target_os = "ios", target_os = "macos"))'.dependencies]
core-foundation = "0.9.4"
system-configuration-sys = "0.6.0"

[target.'cfg(target_os = "windows")'.dependencies]
winreg = "0.10.1"

[dev-dependencies]
httpmock = "0.7.0"
