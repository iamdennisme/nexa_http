name: nexa_http_native_linux
description: Linux native carrier package for nexa_http artifacts and build integration.
version: 1.0.0
publish_to: none
environment:
  sdk: ^3.11.0
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  code_assets: ^1.0.0
  hooks: ^1.0.2
  nexa_http:
    git:
      url: https://github.com/iamdennisme/rust_net.git
      tag_pattern: 'v{{version}}'
      path: packages/nexa_http
    version: ^1.0.0
  path: ^1.9.0

dev_dependencies:
  lints: ^5.1.1
  test: ^1.26.3

flutter:
  plugin:
    platforms:
      linux:
        dartPluginClass: NexaHttpNativeLinuxPlugin
        ffiPlugin: true
