name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  verify-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;29.0.14206865"
      - name: Export Android environment
        run: |
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/29.0.14206865" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/29.0.14206865" >> "$GITHUB_ENV"
      - name: Prepare Android native artifacts
        run: ./scripts/build_native_android.sh debug
      - name: Generated FFI binding verification
        working-directory: packages/nexa_http
        run: |
          flutter pub get
          dart run ffigen --config ffigen.yaml
          git diff --ignore-all-space --exit-code -- lib/src/native_bridge/nexa_http_bindings_generated.dart
      - name: Native ABI contract tests
        run: |
          dart pub get
          dart test test/native_ffi_abi_contract_test.dart \
            test/native_abi_verifier_test.dart \
            test/workspace_demo_and_consumer_verification_test.dart
      - name: Native ABI verification
        run: dart run scripts/workspace_tools.dart verify-native-abi
      - name: Workspace artifact verification
        run: dart run scripts/workspace_tools.dart verify-artifact-consistency
      - name: Development path verification
        run: dart run scripts/workspace_tools.dart verify-development-path
      - name: External consumer verification
        run: dart run scripts/workspace_tools.dart verify-external-consumer

  verify-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - name: Prepare Apple native artifacts
        run: |
          ./scripts/build_native_macos.sh debug
          ./scripts/build_native_ios.sh debug
      - name: Native ABI verification
        run: dart run scripts/workspace_tools.dart verify-native-abi
      - name: Workspace artifact verification
        run: dart run scripts/workspace_tools.dart verify-artifact-consistency
      - name: Development path verification
        run: dart run scripts/workspace_tools.dart verify-development-path
      - name: External consumer verification
        run: dart run scripts/workspace_tools.dart verify-external-consumer

  verify-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Prepare Windows native artifacts
        run: ./scripts/build_native_windows.sh debug
      - name: Native ABI verification
        run: dart run scripts/workspace_tools.dart verify-native-abi
      - name: Workspace artifact verification
        run: dart run scripts/workspace_tools.dart verify-artifact-consistency
      - name: Development path verification
        run: dart run scripts/workspace_tools.dart verify-development-path
      - name: External consumer verification
        run: dart run scripts/workspace_tools.dart verify-external-consumer
